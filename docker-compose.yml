services:
  web:
    image: php:8.2-apache
    container_name: ukumari_web
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./web:/var/www/html
    depends_on:
      - mysql
    command: >
      bash -c "docker-php-ext-install pdo pdo_mysql mysqli &&
              a2enmod rewrite &&
              apache2-foreground"
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_NAME: ${DB_NAME:-ukumari_db}
      DB_USER: ${DB_USER:-ukumari_user}
      DB_PASS: ${DB_PASS:-ukumari_pass}
      APP_NAME: ${APP_NAME:-UKUMARI}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Lima}
      IGV_RATE: ${IGV_RATE:-0.18}
      CURRENCY: ${CURRENCY:-S/}
      WHATSAPP_NUMBER: ${WHATSAPP_NUMBER:-51999000000}
      WHATSAPP_DISPLAY: ${WHATSAPP_DISPLAY:-+51 999 000 000}
      PUNTOS_POR_SOL: ${PUNTOS_POR_SOL:-1}
      PUNTOS_CANJE_BLOQUE: ${PUNTOS_CANJE_BLOQUE:-100}
      SOLES_POR_BLOQUE_CANJE: ${SOLES_POR_BLOQUE_CANJE:-5}
    networks:
      - ukumari_net

  mysql:
    image: mysql:8.0
    container_name: ukumari_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-root_pass}
      MYSQL_DATABASE: ${DB_NAME:-ukumari_db}
      MYSQL_USER: ${DB_USER:-ukumari_user}
      MYSQL_PASSWORD: ${DB_PASS:-ukumari_pass}
    volumes:
      - ukumari_mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-3307}:3306"
    networks:
      - ukumari_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ukumari_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASS:-root_pass}
    ports:
      - "${PMA_PORT:-8081}:80"
    depends_on:
      - mysql
    networks:
      - ukumari_net

volumes:
  ukumari_mysql_data:

networks:
  ukumari_net:
    driver: bridge
